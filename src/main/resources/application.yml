server:
  port: ${PORT:8081}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vaultify}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  liquibase:
    enabled: false

app:
  host: ${APP_HOST:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-minimum-32-chars}
    expiration: ${JWT_EXPIRATION:900000}
  encryption:
    key: ${ENCRYPTION_KEY:32-byte-key-for-AES-256-hex-encoded}

logging:
  level:
    root: INFO
    it.codeaveclionel.vaultify: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:vaultify
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect